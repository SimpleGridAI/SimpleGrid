<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Security meta (GitHub Pages can't set HTTP headers; these are the next-best-thing) -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://us-assets.i.posthog.com https://www.googletagmanager.com https://www.clarity.ms; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://us.i.posthog.com https://www.google-analytics.com https://*.clarity.ms; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="permissions-policy" content="geolocation=(), microphone=(), camera=(), payment=()">

<title>Redirecting… | SimpleGrid Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Legacy router. Redirects /post.html?id=N to /blog/{slug}/ synchronously,
     so this page never actually renders. Kept indexable=no in robots.txt. -->
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<script src="data/blogs.js"></script>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var id = parseInt(params.get('id'), 10);
    if (id && typeof BLOG_DATA !== 'undefined') {
      var blog = BLOG_DATA.find(function (b) { return b.id === id; });
      if (blog && blog.slug) {
        window.location.replace('/blog/' + blog.slug + '/');
        return;
      }
    }
    // No usable id - send to blog list.
    window.location.replace('/blog.html');
  })();
</script>
<!-- Analytics (PostHog + GA4) - deferred to first user interaction. See /assets/js/analytics-init.js -->
<script src="assets/js/analytics-init.js" defer></script>
<!-- Conversion event tracking (data-cta + form + scroll) -->
<script src="assets/js/tracking.js" defer></script>
<!-- Cookie consent banner -->
<script src="assets/js/cookie-consent.js" defer></script>
</head>
<body></body>
</html>
