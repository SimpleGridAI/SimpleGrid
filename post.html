<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting… | SimpleGrid Blog</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Legacy router. Redirects /post.html?id=N to /blog/{slug}/ synchronously,
     so this page never actually renders. Kept indexable=no in robots.txt. -->
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<script src="data/blogs.js"></script>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var id = parseInt(params.get('id'), 10);
    if (id && typeof BLOG_DATA !== 'undefined') {
      var blog = BLOG_DATA.find(function (b) { return b.id === id; });
      if (blog && blog.slug) {
        window.location.replace('/blog/' + blog.slug + '/');
        return;
      }
    }
    // No usable id - send to blog list.
    window.location.replace('/blog.html');
  })();
</script>
<!-- Google tag (gtag.js) - deferred to first user interaction (privacy + perf parity with PostHog).
     To opt out: open DevTools console and run sgPostHogOptOut() - same flag controls both. -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PGZBXNF51L');
  (function(){
    var loaded = false;
    var events = ['mousemove','scroll','click','touchstart','keydown'];
    function trigger(){
      if (loaded) return;
      loaded = true;
      try { if (localStorage.getItem('sg_ph_opt_out') === '1') return; } catch(e){}
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-PGZBXNF51L';
      document.head.appendChild(s);
      events.forEach(function(e){ document.removeEventListener(e, trigger, true); });
    }
    events.forEach(function(e){ document.addEventListener(e, trigger, {once:true, passive:true, capture:true}); });
    setTimeout(trigger, 30000);
  })();
</script>
</head>
<body></body>
</html>
