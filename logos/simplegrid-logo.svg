<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500&amp;display=swap');
      text {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      }
    </style>
  </defs>

  <!-- Grid icon: outer rounded rect + 3x3 inner grid lines -->
  <!-- Outer rounded square -->
  <rect x="2" y="4" width="36" height="36" rx="5" ry="5" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  
  <!-- Vertical dividers -->
  <line x1="14" y1="4" x2="14" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="4" x2="26" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Horizontal dividers -->
  <line x1="2" y1="16" x2="38" y2="16" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="2" y1="28" x2="38" y2="28" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- "SimpleGrid" text -->
  <text x="50" y="30" fill="#1a1a1a" font-size="20" font-weight="500" letter-spacing="-0.3">SimpleGrid</text>
</svg>
