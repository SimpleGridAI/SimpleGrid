<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blog - SimpleGrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data/blogs.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel">
function parseBlogBody(body, title) {
  // Split into paragraphs and detect headings (lines that are short and followed by content)
  const lines = body.split('\n');
  const elements = [];
  let graphicCount = 0;
  
  // Detect subheadings: short lines (< 80 chars) that don't end with period and are followed by longer text
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    // Check if this looks like a subheading
    const isShort = line.length < 80;
    const noEndPunct = !line.endsWith('.') && !line.endsWith('"') && !line.endsWith(')');
    const nextLine = i + 1 < lines.length ? lines[i+1].trim() : '';
    const nextIsLong = nextLine.length > 80;
    
    if (isShort && noEndPunct && nextIsLong && line.length > 10) {
      // Insert a graphic placeholder before some headings
      graphicCount++;
      if (graphicCount % 3 === 0) {
        elements.push(<div key={'g-'+i} className="post-graphic">Infographic / diagram placeholder</div>);
      }
      elements.push(<h2 key={'h-'+i}>{line}</h2>);
    } else if (line.startsWith('Event ') && line.includes(':') && line.length < 120 && line.includes('Actor:')) {
      // Event log lines - render as code
      elements.push(<div key={'e-'+i} style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--fg2)',padding:'4px 0',lineHeight:1.6}}>{line}</div>);
    } else if (/^\d+\.\s/.test(line)) {
      // Numbered list item
      elements.push(<p key={'n-'+i} style={{paddingLeft:8}}><strong>{line.match(/^\d+\./)[0]}</strong> {line.replace(/^\d+\.\s*/, '')}</p>);
    } else {
      elements.push(<p key={'p-'+i}>{line}</p>);
    }
  }
  
  // Add a graphic at the end if few were added
  if (graphicCount < 2) {
    elements.splice(Math.floor(elements.length / 2), 0,
      <div key="g-mid" className="post-graphic">Infographic / visual placeholder</div>
    );
    elements.push(<div key="g-end" className="post-graphic">Summary graphic placeholder</div>);
  }
  
  return elements;
}

function BlogPost() {
  const [showLogin, setShowLogin] = React.useState(false);
  
  // Get blog ID from URL param
  const params = new URLSearchParams(window.location.search);
  const blogId = parseInt(params.get('id')) || 1;
  const blog = BLOG_DATA.find(b => b.id === blogId);
  
  if (!blog) {
    return (<>
      <Nav page="blog" onLoginClick={() => setShowLogin(true)} />
      <div className="container-sm" style={{padding:'80px 32px',textAlign:'center'}}>
        <h2 className="h2">Post not found.</h2>
        <a href="blog.html" className="btn btn-primary" style={{marginTop:16}}>Back to blog</a>
      </div>
      <Footer />
    </>);
  }
  
  // Update page title
  React.useEffect(() => { document.title = blog.title + ' - SimpleGrid'; }, [blog]);
  
  // Find prev/next
  const prevBlog = BLOG_DATA.find(b => b.id === blogId - 1);
  const nextBlog = BLOG_DATA.find(b => b.id === blogId + 1);
  
  return (<>
    <Nav page="blog" onLoginClick={() => setShowLogin(true)} />
    
    <section className="post-header">
      <div className="container-sm">
        <a href="blog.html" style={{fontSize:13,color:'var(--sg-blue)',textDecoration:'none',border:'none'}}>← Back to blog</a>
        <h1>{blog.title}</h1>
        <div className="post-meta">
          <span>{blog.cat}</span>
          <span>{blog.readTime} read</span>
        </div>
      </div>
    </section>
    
    <section className="post-content">
      <div className="container-sm">
        {parseBlogBody(blog.body, blog.title)}
        
        {/* CTA */}
        <div style={{background:'var(--sg-blue-light)',borderRadius:'var(--radius-lg)',padding:'32px',marginTop:40,textAlign:'center'}}>
          <p style={{fontFamily:'var(--font-heading)',fontSize:18,fontWeight:700,color:'var(--fg1)',margin:'0 0 12px'}}>See how this works for your operation.</p>
          <a href="https://calendly.com" target="_blank" rel="noopener" className="btn btn-primary">Book a call with the founder</a>
        </div>
        
        {/* Prev/Next */}
        <div style={{display:'flex',justifyContent:'space-between',marginTop:40,paddingTop:24,borderTop:'1px solid var(--border)',gap:20}}>
          {prevBlog ? (
            <a href={'post.html?id='+prevBlog.id} style={{fontSize:14,color:'var(--sg-blue)',textDecoration:'none',border:'none'}}>← {prevBlog.title.length > 50 ? prevBlog.title.substring(0,50)+'…' : prevBlog.title}</a>
          ) : <span></span>}
          {nextBlog ? (
            <a href={'post.html?id='+nextBlog.id} style={{fontSize:14,color:'var(--sg-blue)',textDecoration:'none',border:'none',textAlign:'right'}}>{nextBlog.title.length > 50 ? nextBlog.title.substring(0,50)+'…' : nextBlog.title} →</a>
          ) : <span></span>}
        </div>
      </div>
    </section>
    
    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<BlogPost />);
</script>
</body>
</html>
