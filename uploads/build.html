<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Build Your ERP - SimpleGrid</title>
<meta name="description" content="Sketch a starter ERP around your business process. Chat with our assistant. Get a working outline in 5 minutes.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/BuildChatbot.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
function App() {
  const [authed, setAuthed] = React.useState(() => {
    try { return localStorage.getItem('sg_auth') === '1'; } catch { return false; }
  });
  const [showLogin, setShowLogin] = React.useState(!authed);

  return (<>
    <Nav page="build" onLoginClick={() => setShowLogin(true)} />
    <section className="section">
      <div className="container">
        <div className="tag">BUILD YOUR ERP</div>
        <h1 className="h2" style={{marginBottom:12}}>Sketch a starter ERP around your business.</h1>
        <p className="lead" style={{maxWidth:720,marginBottom:32}}>Answer 7 questions. Our assistant maps your entities, rules, and roles into a working outline. Takes 5 minutes. No commitment.</p>
        {authed ? (
          <BuildChatbot />
        ) : (
          <div style={{background:'var(--sg-off-white)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',padding:'48px 32px',textAlign:'center'}}>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--fg3)" strokeWidth="1.5" style={{margin:'0 auto 16px'}}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
            <h3 style={{fontFamily:'var(--font-heading)',fontSize:20,margin:'0 0 8px'}}>Log in to start</h3>
            <p style={{color:'var(--fg2)',fontSize:14,marginBottom:20,maxWidth:420,margin:'0 auto 20px'}}>Your sketch is saved to your account so you can come back to it. Log in to begin.</p>
            <button className="btn btn-primary" onClick={() => setShowLogin(true)}>Log in to continue</button>
          </div>
        )}
      </div>
    </section>
    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} onSuccess={() => { setAuthed(true); setShowLogin(false); }} title="Log in to build your ERP" sub="Save your progress. Come back any time." />}
    <div className="mobile-cta">
      <a href="https://calendly.com" target="_blank" rel="noopener" className="btn btn-primary">Book a call with the founder</a>
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
