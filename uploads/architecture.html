<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Architecture - Why 7 Days Is Possible | SimpleGrid</title>
<meta name="description" content="How SimpleGrid is built: event sourcing, configuration not code, every rule as a row. The architecture that makes 7-day deployments possible.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="assets/simplegrid-logomark.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/LoginModal.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>

<script type="text/babel">
const pillars = [
  {
    n: '01', t: 'One permanent record',
    tagline: 'Event sourcing. Every action recorded once. Never changed.',
    body: 'Traditional ERPs store the current state. When something changes, they overwrite. The history is gone. SimpleGrid stores every event - receipt, approval, dispatch, edit - as an immutable row. Your current state is computed from the log. Audit trail is not a feature we added. It is how the system is built.',
    bullets: ['Append-only event log', 'Point-in-time reconstruction of any record', 'No silent edits, no "who changed this"', 'Regulator-ready evidence from day one'],
  },
  {
    n: '02', t: 'Configuration, not code',
    tagline: 'AI writes a configuration. Platform reads it. Forms, workflows, rules, dashboards - all generated.',
    body: 'Most ERPs ship with pre-built modules. To change behaviour, you change code, then deploy. SimpleGrid ships with a generic engine. Your business definition is a configuration file. The engine reads it and renders your specific screens, rules, and workflows at runtime. Change the config, the system changes instantly. No deploy cycle.',
    bullets: ['Domain-driven configuration per client', 'UI and workflows generated on read', 'Zero-downtime rule changes', 'Same platform runs 100 clients, all different'],
  },
  {
    n: '03', t: 'Every rule is a row',
    tagline: 'Approval above $10K? One row. QC before dispatch? One row. No code. No deploy cycle.',
    body: 'Business rules are data, not logic hardcoded in modules. Each rule is a row in a rules table with a condition and an action. Add a rule - insert a row. Remove a rule - delete a row. Modify a rule - update a row. Your operations team can edit rules without filing a ticket.',
    bullets: ['Rules live in the database, not the app', 'Editable without an IT ticket', 'Versioned - see who changed what, when', 'Testable against historical events'],
  },
  {
    n: '04', t: 'Multi-tenant isolation',
    tagline: 'Every client gets their own database. Shared platform. Completely separate data.',
    body: 'Shared-table multi-tenancy (one DB, tenant_id column) saves infrastructure cost but mixes everyone\'s data in one table. We use database-per-tenant. Your data never shares a row with anyone else. Platform upgrades roll out centrally. Your data stays where it is.',
    bullets: ['Database-per-tenant, not row-level', 'Per-client encryption keys', 'Noisy neighbour cannot impact you', 'Full data export any time, your format'],
  },
  {
    n: '05', t: 'Roles-as-data',
    tagline: 'Who sees what is a configuration, not a code path.',
    body: 'Your warehouse manager sees inventory. Your planner sees orders. Your founder sees everything. Every role is a set of read/write rules against entities. Add a new role, define its reach in config, it is live. No feature work needed.',
    bullets: ['Entity-level read/write permissions', 'Role composition (a planner + QC hybrid)', 'Field-level masking when required', 'Audit of every permission change'],
  },
  {
    n: '06', t: 'Native AI surface',
    tagline: 'Plain-English input. Plain-English answers. Not a chatbot bolted on.',
    body: 'Most ERPs added AI on top - a chatbot that queries the same clunky system. SimpleGrid was built around natural language. Your team types what happened. The system parses, matches, records, triggers. Your founder asks a question. The system answers from the live ledger. One system. One surface.',
    bullets: ['NL input for receipts, approvals, dispatch', 'NL queries against live event log', 'Grounded in your data - no hallucinations', 'Same audit trail as any other action'],
  },
];

function ArchPage() {
  const [showLogin, setShowLogin] = React.useState(false);
  return (<>
    <Nav page="arch" onLoginClick={() => setShowLogin(true)} />
    <section className="section section-dark" style={{paddingTop:80,paddingBottom:48}}>
      <div className="container">
        <div className="tag" style={{color:'rgba(255,255,255,0.45)'}}>ARCHITECTURE</div>
        <h1 className="h1" style={{color:'#fff',maxWidth:820}}>Why 7-day deployments are possible.</h1>
        <p className="lead" style={{color:'rgba(255,255,255,0.7)',maxWidth:720,marginTop:16}}>
          SimpleGrid is not a faster way to configure a traditional ERP. It is a different architecture. Six design choices that make rapid deployment, real customization, and full audit trails possible at the same time.
        </p>
      </div>
    </section>

    <section className="section">
      <div className="container">
        <div style={{display:'flex',flexDirection:'column',gap:32}}>
          {pillars.map((p, i) => (
            <div key={p.n} style={{display:'grid',gridTemplateColumns:'120px 1fr',gap:32,padding:'32px 0',borderTop: i > 0 ? '1px solid var(--border)' : 'none'}} className="arch-row">
              <div>
                <div style={{fontFamily:'var(--font-heading)',fontSize:48,fontWeight:700,color:'var(--sg-blue)',letterSpacing:'-0.03em',lineHeight:1}}>{p.n}</div>
              </div>
              <div>
                <h2 style={{fontFamily:'var(--font-heading)',fontSize:28,fontWeight:700,margin:'0 0 12px',letterSpacing:'-0.01em',color:'var(--fg1)'}}>{p.t}</h2>
                <p style={{fontSize:17,color:'var(--sg-blue)',fontWeight:500,margin:'0 0 16px',lineHeight:1.5}}>{p.tagline}</p>
                <p style={{fontSize:15,color:'var(--fg2)',lineHeight:1.7,margin:'0 0 16px',maxWidth:680}}>{p.body}</p>
                <ul style={{listStyle:'none',padding:0,margin:0,display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'8px 24px',maxWidth:680}}>
                  {p.bullets.map((b,j) => (
                    <li key={j} style={{fontSize:13,color:'var(--fg2)',display:'flex',gap:8,alignItems:'flex-start'}}>
                      <span style={{color:'var(--sg-green)',fontWeight:700,marginTop:1}}>✓</span>{b}
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>

    <section className="section section-dark final-cta">
      <div className="container">
        <h2 className="h2">Ready to see it on your operation?</h2>
        <p className="sub">Book a call. We map your business on a whiteboard and show you a working system in 7 days.</p>
        <a href="https://calendly.com" target="_blank" rel="noopener" className="btn btn-lg btn-primary">Book a call with the founder</a>
      </div>
    </section>

    <Footer />
    {showLogin && <LoginModal onClose={() => setShowLogin(false)} />}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ArchPage />);
</script>
</body>
</html>
