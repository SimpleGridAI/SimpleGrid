<style>
.confidential-banner { background: var(--sg-blue-light); border: 1px solid rgba(74,123,247,0.3); border-radius: 8px; padding: 12px 18px; font-size: 13px; color: var(--sg-blue-dark); margin: 24px 0; display: inline-flex; align-items: center; gap: 10px; }
.infographic { background: linear-gradient(180deg, #fff 0%, var(--sg-off-white) 100%); border: 1px solid var(--border); border-radius: 14px; padding: 40px; margin: 32px 0; }
.infographic-title { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; color: var(--sg-blue); text-transform: uppercase; margin-bottom: 8px; }
.infographic-h { font-family: var(--font-heading); font-size: 26px; font-weight: 700; color: var(--fg1); letter-spacing: -0.015em; margin: 0 0 28px; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin: 8px 0 32px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; }
.stat-cell { padding: 22px 20px; border-right: 1px solid var(--border); }
.stat-cell:last-child { border-right: none; }
.stat-num { font-family: var(--font-heading); font-size: 38px; font-weight: 700; color: var(--sg-blue); letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px; }
.stat-num .unit { font-size: 16px; color: var(--fg3); font-weight: 500; margin-left: 4px; }
.stat-label { font-size: 12px; color: var(--fg2); line-height: 1.4; }
.network-svg { width: 100%; height: auto; display: block; }
@keyframes apex-pulse { 0%, 100% { opacity: 0.3; r: 6; } 50% { opacity: 1; r: 9; } }
@keyframes apex-flow { 0% { stroke-dashoffset: 60; } 100% { stroke-dashoffset: 0; } }
.spoke-line { stroke-dasharray: 4 4; animation: apex-flow 3s linear infinite; }
.spoke-dot { animation: apex-pulse 2.4s ease-in-out infinite; }
.split-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
.split-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 22px; border-top: 3px solid var(--sg-blue); }
.split-card.alt { border-top-color: var(--sg-purple); }
.split-card.alt2 { border-top-color: var(--sg-gold); }
.split-card h4 { font-family: var(--font-heading); font-size: 15px; font-weight: 700; color: var(--fg1); margin: 0 0 6px; letter-spacing: -0.01em; }
.split-card p { font-size: 13px; color: var(--fg2); line-height: 1.6; margin: 0; }
.split-card .vol { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--sg-blue); margin: 8px 0 10px; letter-spacing: -0.015em; }
.split-card.alt .vol { color: var(--sg-purple); }
.split-card.alt2 .vol { color: var(--sg-gold); }

/* ===== By the Numbers - second infographic ===== */
.btn-info { background: linear-gradient(180deg, #fff 0%, var(--sg-off-white) 100%); border: 1px solid var(--border); border-radius: 14px; padding: 40px; margin: 32px 0; }
.btn-info-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 28px; align-items: stretch; margin-top: 8px; }
.btn-bars { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 26px; }
.btn-bars h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 700; margin: 0 0 18px; color: var(--fg1); letter-spacing: 0.01em; }
.bar-row { display: grid; grid-template-columns: 110px 1fr 80px; align-items: center; gap: 12px; margin-bottom: 14px; }
.bar-label { font-size: 12px; font-weight: 600; color: var(--fg2); }
.bar-track { height: 24px; background: var(--sg-off-white); border-radius: 6px; overflow: hidden; position: relative; border: 1px solid var(--border); }
.bar-fill { height: 100%; border-radius: 5px 0 0 5px; transition: width 1.6s cubic-bezier(.4,0,.2,1); position: relative; }
.bar-fill.cmt   { background: linear-gradient(90deg, #4A7BF7, #6E97FF); }
.bar-fill.brand { background: linear-gradient(90deg, #A78BFA, #C4B5FD); }
.bar-fill.trade { background: linear-gradient(90deg, #F59E0B, #FBBF24); }
.bar-value { font-family: var(--font-heading); font-size: 15px; font-weight: 700; color: var(--fg1); text-align: right; }
.btn-locations { background: linear-gradient(135deg, #fff, var(--sg-off-white)); border: 1px solid var(--border); border-radius: 12px; padding: 26px; display: flex; flex-direction: column; gap: 14px; }
.loc-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: #fff; border: 1px solid var(--border); border-radius: 8px; }
.loc-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-weight: 700; }
.loc-icon.a { background: var(--sg-blue); }
.loc-icon.b { background: var(--sg-gold); }
.loc-icon.c { background: var(--sg-purple); }
.loc-row .meta { flex: 1; }
.loc-row .meta .h { font-family: var(--font-heading); font-size: 14px; font-weight: 700; color: var(--fg1); margin: 0 0 2px; }
.loc-row .meta .s { font-size: 11px; color: var(--fg3); }
.loc-row .ct { font-family: var(--font-heading); font-size: 22px; font-weight: 700; color: var(--fg1); letter-spacing: -0.02em; }
.btn-flow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; margin-top: 28px; background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.flow-cell { padding: 18px 14px; border-right: 1px solid var(--border); position: relative; text-align: center; }
.flow-cell:last-child { border-right: none; }
.flow-cell .step-n { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; color: var(--sg-blue); margin-bottom: 8px; }
.flow-cell .step-h { font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: var(--fg1); margin-bottom: 4px; line-height: 1.2; }
.flow-cell .step-p { font-size: 11px; color: var(--fg3); line-height: 1.4; }
.flow-cell::after { content: '→'; position: absolute; right: -7px; top: 50%; transform: translateY(-50%); background: #fff; color: var(--sg-blue); width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; z-index: 2; }
.flow-cell:last-child::after { display: none; }

@media (max-width: 960px) {
  .stat-row { grid-template-columns: 1fr 1fr; }
  .stat-cell:nth-child(1), .stat-cell:nth-child(2) { border-bottom: 1px solid var(--border); }
  .stat-cell:nth-child(2) { border-right: none; }
  .split-row { grid-template-columns: 1fr; gap: 12px; }
}
@media (max-width: 760px) {
  .infographic, .btn-info { padding: 22px 18px; margin: 22px 0; }
  .infographic-h { font-size: 20px; margin-bottom: 18px; }
  .stat-cell { padding: 16px 14px; }
  .stat-num { font-size: 28px; }
  .stat-num .unit { font-size: 14px; }
  .stat-label { font-size: 11.5px; }
  .btn-info-grid { grid-template-columns: 1fr; gap: 18px; }
  .btn-bars, .btn-locations { padding: 18px; }
  .btn-flow { grid-template-columns: 1fr; }
  .flow-cell { border-right: none; border-bottom: 1px solid var(--border); }
  .flow-cell:last-child { border-bottom: none; }
  .flow-cell::after { display: none; }
  .bar-row { grid-template-columns: 90px 1fr 60px; gap: 10px; }
  .bar-label { font-size: 11.5px; }
  .bar-value { font-size: 13px; }
  .loc-row { padding: 10px 12px; gap: 12px; }
  .loc-row .ct { font-size: 18px; }
  .split-card { padding: 18px; }
  .split-card .vol { font-size: 19px; }
}
@media (max-width: 480px) {
  .stat-row { grid-template-columns: 1fr; }
  .stat-cell { border-right: none; border-bottom: 1px solid var(--border); }
  .stat-cell:last-child { border-bottom: none; }
}
</style>

<div id="root"></div>
<script type="text/babel" src="components/Nav.jsx"></script>

<script type="text/babel">
function BarsInfographic() {
  const [animate, setAnimate] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { setAnimate(true); obs.disconnect(); } });
    }, { threshold: 0.2 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  // Volume share: CMT 55k, Brand 25k, Trading is fabric (different unit) -> shown as separate bar in meters or rolls
  const bars = [
    { cls: 'cmt',   label: 'CMT (contract)', value: 55000, max: 60000, display: '55,000', unit: 'shirts/mo' },
    { cls: 'brand', label: 'Own brand',      value: 25000, max: 60000, display: '25,000', unit: 'shirts/mo' },
    { cls: 'trade', label: 'Fabric trading', value: 38000, max: 60000, display: '~40,000', unit: 'meters/mo' },
  ];

  const locs = [
    { cls: 'a', count: '20+', h: 'Job worker units',  s: 'Cut · stitch · finish - across the city' },
    { cls: 'b', count: '10+', h: 'Logistics warehouses', s: 'Partner-operated, fabric & finished goods' },
    { cls: 'c', count: '2',   h: 'In-house operations',  s: 'Ironing & packaging only' },
  ];

  const flow = [
    { n: '01', h: 'Fabric procured',     p: 'PO raised, stock checked across all 30+ locations first' },
    { n: '02', h: 'Issued to job worker', p: 'Fabric + trims sent together, tracked per work order' },
    { n: '03', h: 'Production',           p: '20+ independent job workers, full cut-make-trim' },
    { n: '04', h: 'Returned & QC',        p: 'Reconciled against issued: yield, rejects, settlement' },
    { n: '05', h: 'Iron · pack · dispatch', p: 'In-house finishing, packed to buyer specs' },
  ];

  return (
    <div className="btn-info" ref={ref}>
      <div className="infographic-title">BY THE NUMBERS</div>
      <div className="infographic-h" role="heading" aria-level="3">Three streams. One inventory. Thirty-plus locations.</div>

      <div className="btn-info-grid">
        {/* Volume by stream */}
        <div className="btn-bars">
          <h4>Monthly throughput by stream</h4>
          {bars.map(b => (
            <div key={b.label} className="bar-row">
              <div className="bar-label">{b.label}</div>
              <div className="bar-track">
                <div
                  className={'bar-fill ' + b.cls}
                  style={{ width: animate ? `${(b.value / b.max) * 100}%` : '0%' }}
                />
              </div>
              <div className="bar-value">
                {b.display}<br/>
                <span style={{fontSize:10,fontWeight:500,color:'var(--fg3)',letterSpacing:'0.05em'}}>{b.unit}</span>
              </div>
            </div>
          ))}
          <div style={{marginTop:18,paddingTop:14,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.12em',color:'var(--fg3)'}}>TOTAL SHIRTS / MONTH</div>
            <div style={{fontFamily:'var(--font-heading)',fontSize:24,fontWeight:700,color:'var(--sg-blue)',letterSpacing:'-0.02em'}}>80,000 – 100,000</div>
          </div>
        </div>

        {/* Where the inventory lives */}
        <div className="btn-locations">
          <h4 style={{fontFamily:'var(--font-heading)',fontSize:14,fontWeight:700,margin:'0 0 4px'}}>Where the inventory lives</h4>
          <p style={{fontSize:12,color:'var(--fg3)',margin:'0 0 8px',lineHeight:1.5}}>Stock sits with partners and producers - not in a single factory. SimpleGrid tracks every roll, trim, and garment across all 30+ live locations.</p>
          {locs.map(l => (
            <div key={l.h} className="loc-row">
              <div className={'loc-icon ' + l.cls}>{l.count}</div>
              <div className="meta">
                <div className="h">{l.h}</div>
                <div className="s">{l.s}</div>
              </div>
              <div className="ct" style={{
                color: l.cls==='a' ? 'var(--sg-blue)' : l.cls==='b' ? 'var(--sg-gold)' : 'var(--sg-purple)'
              }}>●</div>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginTop:6,paddingTop:14,borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.12em',color:'var(--fg3)'}}>LIVE INVENTORY POINTS</div>
            <div style={{fontFamily:'var(--font-heading)',fontSize:24,fontWeight:700,color:'var(--sg-blue)',letterSpacing:'-0.02em'}}>30+</div>
          </div>
        </div>
      </div>

      {/* Production flow */}
      <div className="btn-flow">
        {flow.map(f => (
          <div key={f.n} className="flow-cell">
            <div className="step-n">{f.n}</div>
            <div className="step-h">{f.h}</div>
            <div className="step-p">{f.p}</div>
          </div>
        ))}
      </div>

      {/* Outcome strip */}
      <div style={{marginTop:28,display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:0,border:'1px solid var(--sg-blue)',borderRadius:12,overflow:'hidden',background:'linear-gradient(135deg, rgba(74,123,247,0.04), rgba(74,123,247,0.08))'}}>
        {[
          { n: '24', u: 'hours', l: 'Working demo delivered' },
          { n: '12', u: 'days',  l: 'From kickoff to live' },
          { n: '34', u: '',      l: 'Domain entities tracked' },
          { n: '44', u: '',      l: 'Automatic triggers wired' },
        ].map((s,i) => (
          <div key={i} style={{padding:'22px 20px',borderRight:i<3?'1px solid rgba(74,123,247,0.25)':'none',textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-heading)',fontSize:38,fontWeight:700,color:'var(--sg-blue)',letterSpacing:'-0.02em',lineHeight:1}}>
              {s.n}{s.u && <span style={{fontSize:14,color:'var(--fg3)',fontWeight:500,marginLeft:4}}>{s.u}</span>}
            </div>
            <div style={{fontSize:11,color:'var(--fg2)',marginTop:8,letterSpacing:'0.04em'}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NetworkInfographic() {
  // Hub-and-spoke: central warehouse → 30 dots around (job workers + logistics warehouses)
  const cx = 400, cy = 240, r = 180;
  const nodes = Array.from({ length: 30 }, (_, i) => {
    const angle = (i / 30) * Math.PI * 2 - Math.PI / 2;
    return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, i };
  });
  const colorOf = (i) => {
    if (i % 5 === 0) return 'var(--sg-purple)';
    if (i % 3 === 0) return 'var(--sg-gold)';
    return 'var(--sg-blue)';
  };
  return (
    <svg viewBox="0 0 800 480" className="network-svg">
      <defs>
        <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="rgba(74,123,247,0.25)" />
          <stop offset="100%" stopColor="rgba(74,123,247,0)" />
        </radialGradient>
      </defs>
      <circle cx={cx} cy={cy} r="120" fill="url(#hubGlow)" />
      {nodes.map((n, i) => (
        <line key={`l-${i}`} x1={cx} y1={cy} x2={n.x} y2={n.y} stroke={colorOf(i)} strokeWidth="1" opacity="0.35" className="spoke-line" style={{ animationDelay: `${i * 0.1}s` }} />
      ))}
      {nodes.map((n, i) => (
        <circle key={`d-${i}`} cx={n.x} cy={n.y} r="7" fill={colorOf(i)} className="spoke-dot" style={{ animationDelay: `${i * 0.08}s` }} />
      ))}
