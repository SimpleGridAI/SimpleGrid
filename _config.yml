# GitHub Pages site config.
#
# This file is HONORED by Jekyll. For its `exclude:` list to actually take
# effect, the repo MUST NOT contain a `.nojekyll` file at the root - `.nojekyll`
# bypasses Jekyll entirely and silently serves every file in the repo. The
# `.nojekyll` file has been removed deliberately.
#
# Jekyll behavior with the settings below:
#   - HTML files without YAML front matter are copied to _site/ unchanged
#     (no Liquid processing, no layout wrapping). Our files have no `---`
#     front matter and no `{{ }}` / `{% %}` tokens, so they pass through clean.
#   - Files/dirs starting with `_` or `.` are excluded by Jekyll default.
#     `.well-known/` is force-included below so /security.txt keeps working.
#   - Entries in `exclude:` below are not copied to _site/ at all - they
#     return HTTP 404 on simplegrid.ai.
#   - Anything we want as an exact-copy passthrough is in `keep_files:`.

# Stop Jekyll from running Liquid/layout on plain HTML - we ship raw HTML.
markdown: kramdown
sass:
  style: compressed

# Force-include hidden dirs we DO want served.
include:
  - .well-known

# Files Jekyll should preserve in _site/ between builds (safety belt for the
# /vendor/ directory we self-host React from).
keep_files:
  - vendor

exclude:
  # Internal docs / project metadata - should never be public.
  - CLAUDE.md
  - AUDIT_SIMPLEGRID.md
  - AUDIT_FIXES_TODO.md
  - AUDIT_SIMPLEGRID-2026-05-27.md
  - SEO_STRATEGY_SIMPLEGRID.md
  - SEO_STRATEGY.md
  - CRITICAL_DASHBOARD_ACTIONS.md
  - audit-2026-05-23.md
  - audit-artifacts/
  - seo-research/
  - seo-audit/
  - .claude/
  - README.md
  - BUILD.md

  # Build/dev metadata - leaks toolchain + dependencies.
  - package.json
  - package-lock.json
  - babel.config.json
  - .babelrc
  - .gitignore
  - .DS_Store
  - .vscode/
  - node_modules/
  - .node/

  # Build scripts (not needed at runtime; production reads only the .html/.js output).
  - scripts/
  - tools/_blog_optimize.py
  - tools/_bump_fonts.py
  - tools/_drop_geist.py

  # JSX source files (the .js compiled versions are what the browser loads).
  - components/*.jsx
  - app/*.jsx
  - "**/*.jsx.bak"

  # `_headers` is Cloudflare-Pages / Netlify syntax and is ignored by GitHub
  # Pages. It's kept in the repo as documentation of intent for the day we
  # migrate to Cloudflare Pages. Don't serve it.
  - _headers

# Note: `/data/blogs.js` is intentionally NOT excluded - it ships to the browser
# for blog.html (the list page) at runtime.
