<style>
/* ====== Shared infographic shell (matches apex) ====== */
.infographic { background: linear-gradient(180deg, #fff 0%, var(--sg-off-white) 100%); border: 1px solid var(--border); border-radius: 14px; padding: 40px; margin: 32px 0; }
.infographic-title { font-size: 11px; font-weight: 700; letter-spacing: 0.16em; color: var(--sg-blue); text-transform: uppercase; margin-bottom: 8px; }
.infographic-h { font-family: var(--font-heading); font-size: 26px; font-weight: 700; color: var(--fg1); letter-spacing: -0.015em; margin: 0 0 28px; }
.infographic-sub { font-size: 14px; color: var(--fg2); line-height: 1.55; margin: -22px 0 28px; max-width: 760px; }

/* ====== Value-delivered infographic ====== */
.value-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 8px; }
.value-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; position: relative; overflow: hidden; }
.value-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.value-card.a::before { background: var(--sg-blue); }
.value-card.b::before { background: var(--sg-green); }
.value-card.c::before { background: var(--sg-gold); }
.value-card.d::before { background: var(--sg-purple); }
.value-card .icon-box { width: 36px; height: 36px; border-radius: 8px; display:flex; align-items:center; justify-content:center; margin-bottom: 14px; color: #fff; }
.value-card.a .icon-box { background: var(--sg-blue); }
.value-card.b .icon-box { background: var(--sg-green); }
.value-card.c .icon-box { background: var(--sg-gold); }
.value-card.d .icon-box { background: var(--sg-purple); }
.value-card h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 700; color: var(--fg1); margin: 0 0 12px; letter-spacing: 0.005em; }
.value-card .ba { display:flex; align-items:baseline; gap:8px; margin: 0; font-family: var(--font-heading); }
.value-card .ba .from { font-size: 16px; color: var(--fg3); text-decoration: line-through; }
.value-card .ba .arrow { color: var(--fg3); font-size: 13px; }
.value-card .ba .to { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.value-card.a .ba .to { color: var(--sg-blue); }
.value-card.b .ba .to { color: var(--sg-green); }
.value-card.c .ba .to { color: var(--sg-gold); }
.value-card.d .ba .to { color: var(--sg-purple); }
.value-card .delta { display:inline-block; margin-top: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 999px; }
.value-card.a .delta { background: rgba(74,123,247,0.1); color: var(--sg-blue); }
.value-card.b .delta { background: rgba(16,185,129,0.1); color: var(--sg-green); }
.value-card.c .delta { background: rgba(245,158,11,0.1); color: var(--sg-gold); }
.value-card.d .delta { background: rgba(167,139,250,0.12); color: var(--sg-purple); }
.value-card .desc { font-size: 12px; color: var(--fg3); line-height: 1.55; margin: 12px 0 0; }

/* ====== Manufacturing process infographic ====== */
.proc-info .legend { display:flex; gap:16px; flex-wrap:wrap; margin-bottom: 20px; font-size: 12px; color: var(--fg2); }
.proc-info .legend .lg { display:inline-flex; align-items:center; gap:6px; }
.proc-info .legend .lg::before { content:''; width: 10px; height: 10px; border-radius: 50%; }
.proc-info .legend .lg.comp::before { background: var(--sg-blue); }
.proc-info .legend .lg.sku::before  { background: var(--sg-purple); }
.proc-info .legend .lg.qc::before   { background: var(--sg-gold); }
.proc-info .legend .lg.fin::before  { background: var(--sg-green); }

.proc-flow { display: grid; grid-template-columns: 1fr; gap: 0; }
.proc-row { display: grid; grid-template-columns: 56px 1fr 220px; align-items: stretch; gap: 0; position: relative; }
.proc-row .step-num { font-family: var(--font-heading); font-size: 16px; font-weight: 700; color: var(--fg3); display:flex; align-items:flex-start; justify-content:center; padding-top: 18px; border-right: 2px dashed var(--border); position: relative; }
.proc-row .step-num::before { content:''; position:absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--border); transform: translateX(-50%); z-index: 0; }
.proc-row .step-num span { background: #fff; border: 2px solid var(--border); border-radius: 999px; width: 32px; height: 32px; display:flex; align-items:center; justify-content:center; position: relative; z-index: 1; font-size: 12px; }
.proc-row.comp .step-num span { border-color: var(--sg-blue); color: var(--sg-blue); }
.proc-row.sku  .step-num span { border-color: var(--sg-purple); color: var(--sg-purple); }
.proc-row.qc   .step-num span { border-color: var(--sg-gold); color: var(--sg-gold); }
.proc-row.fin  .step-num span { border-color: var(--sg-green); color: var(--sg-green); }
.proc-row .step-body { padding: 16px 24px; }
.proc-row .step-body h5 { font-family: var(--font-heading); font-size: 14px; font-weight: 700; color: var(--fg1); margin: 0 0 4px; letter-spacing: 0.005em; }
.proc-row .step-body p { font-size: 12.5px; color: var(--fg2); line-height: 1.55; margin: 0; }
.proc-row .step-meta { padding: 16px 18px; background: rgba(0,0,0,0.025); border-left: 1px solid var(--border); display:flex; flex-direction: column; justify-content: center; gap: 4px; min-height: 0; }
.proc-row .step-meta .lbl { font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em; color: var(--fg3); text-transform: uppercase; }
.proc-row .step-meta .val { font-family: var(--font-heading); font-size: 12.5px; font-weight: 700; color: var(--fg1); line-height: 1.3; }
.proc-row.comp .step-meta { background: rgba(74,123,247,0.04); }
.proc-row.sku  .step-meta { background: rgba(167,139,250,0.05); }
.proc-row.qc   .step-meta { background: rgba(245,158,11,0.06); }
.proc-row.fin  .step-meta { background: rgba(16,185,129,0.05); }

.stage-divider { display:flex; align-items:center; gap: 14px; margin: 14px 0; padding: 10px 18px; background: linear-gradient(90deg, var(--sg-off-white), #fff); border: 1px dashed var(--border); border-radius: 8px; }
.stage-divider .pill { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--sg-blue); padding: 4px 10px; border-radius: 999px; background: rgba(74,123,247,0.08); }
.stage-divider .stage-h { font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: var(--fg1); }
.stage-divider .stage-s { font-size: 12px; color: var(--fg3); }

/* Contractor pricing table */
.contractor-table { margin-top: 32px; background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.contractor-table .ct-h { padding: 16px 20px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.contractor-table .ct-h h4 { font-family: var(--font-heading); font-size: 14px; font-weight: 700; color: var(--fg1); margin: 0; }
.contractor-table .ct-h .note { font-size: 11px; color: var(--fg3); }
.contractor-table .ct-row { display: grid; grid-template-columns: 1.1fr 1.5fr 1.4fr; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; gap: 16px; }
.contractor-table .ct-row:last-child { border-bottom: none; }
.contractor-table .ct-stage { display:flex; align-items:center; gap: 10px; font-family: var(--font-heading); font-size: 13px; font-weight: 700; color: var(--fg1); }
.contractor-table .ct-stage .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.contractor-table .ct-rate { font-size: 13px; color: var(--fg1); font-weight: 600; }
.contractor-table .ct-detail { font-size: 12px; color: var(--fg3); line-height: 1.5; }

@media (max-width: 760px) {
  .value-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .value-card { padding: 18px 16px; }
  .value-card h4 { font-size: 13px; margin-bottom: 10px; }
  .value-card .ba { flex-wrap: wrap; row-gap: 2px; }
  .value-card .ba .from { font-size: 14px; }
  .value-card .ba .to { font-size: 22px; }
  .value-card .desc { font-size: 11.5px; }
  .proc-row { grid-template-columns: 48px 1fr; }
  .proc-row .step-meta { display: none; }
  .contractor-table .ct-row { grid-template-columns: 1fr; gap: 4px; }
}
@media (max-width: 520px) {
  .value-grid { grid-template-columns: 1fr; gap: 12px; }
  .value-card .ba .to { font-size: 24px; }
}
</style>

function ValueInfographic() {
  const items = [
    {
      cls: 'a',
      icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      h: 'Planning time',

      to: '2 hrs',
      delta: '−90%',
      desc: 'A week of planner-only spreadsheet work compressed into a single morning. The system aggregates wood requirements across orders automatically.',
    },
    {
      cls: 'b',
      icon: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m1 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>,

}

function ManufacturingProcessSection() {
  // 13-step abbreviated production flow (left column)
  const flow = [
    {h:'Buyer PO arrives',          b:'AI parses any PDF format. Sales order created with line items.'},
    {h:'SO approved',               b:'Cost snapshot freezes. Planning unlocks.'},
    {h:'Planner allocates',         b:'Per SKU: in-house vs. vendor splits. Tracked automatically.'},
    {h:'Wood needs aggregated',     b:'All component-level wood requirements rolled up across orders.'},
    {h:'Wood PO consolidated',      b:'One PO per species + thickness. Multi-vendor quoted.'},
    {h:'Wood received',             b:'Seasoned/unseasoned check at receipt. Inventory + AP update live.'},
    {h:'Issued to machining',       b:'Each cubic foot attaches to a SKU + component.'},
    {h:'QC + components stocked',   b:'Pass enters component stock; fail returns or scraps.'},
    {h:'Assembly',                  b:'Components merge into a SKU. Tracking shifts component → SKU.'},
    {h:'Sand · finish · hardware',  b:'Per-sqft, per-sqft, per-fitting × screw size. QC at every gate.'},
    {h:'Final QC',                  b:'Buyer-spec gate. Photo, moisture, dimensions. Block on fail.'},
    {h:'Packaging + dispatch',      b:'CBM auto-calculated. Container loaded.'},
    {h:'Invoice + settlement',      b:"Buyer billed. Six contractors auto-settled, each on its own formula."},
  ];

  // Stage A/B/C/D framework (right column)
  const stages = [
    { letter:'A', title:'Components', range:'01–06', color:'var(--sg-blue)',   desc:'Wood in, machined parts out. Tracking is per component, per SKU.' },
    { letter:'B', title:'Assembly',   range:'07–09', color:'var(--sg-purple)', desc:'Components merge into a SKU. From here, tracking is per SKU.' },
    { letter:'C', title:'Finishing',  range:'10–15', color:'var(--sg-gold)',   desc:'Sand, finish, hardware. The most error-prone window.' },
    { letter:'D', title:'Dispatch',   range:'16–19', color:'var(--sg-green)',  desc:'Final QC, pack, ship. Buyer-spec compliance enforced.' },
  ];

  // Contractor settlement matrix (full width below)
  const pricing = [
    { color:'var(--sg-blue)',   stage:'Machining',        rate:'Per sqft (panels) · per running ft (frames)', detail:'Rate varies by wood thickness. System reads the issuance ticket and applies the right matrix.' },
    { color:'var(--sg-purple)', stage:'Assembly',         rate:'Per SKU',                                    detail:"Each assembled unit GRN'd from the contractor settles on the SKU rate card." },
    { color:'var(--sg-blue)',   stage:'Sanding',          rate:'Per sqft of finished surface (90%)',         detail:'For irregular profiles, rate falls back to per-SKU. System holds both rate types.' },
    { color:'var(--sg-green)',  stage:'Finishing',        rate:'Per sqft of finished surface (90%)',         detail:'Multi-coat sequences priced as one unit per pass. Coat count tracked, rate is per surface.' },
    { color:'var(--sg-gold)',   stage:'Hardware fitting', rate:'Per fitting × screw-size matrix',            detail:'Each hinge, slide, handle, screw priced individually. Larger screws → higher labor rate.' },
    { color:'var(--sg-green)',  stage:'Packaging',        rate:'Per CBM of packed material',                 detail:'CBM auto-calculated from carton dimensions at pack-out. Settles to packing contractor on dispatch.' },
  ];

  return (
    <section className="case-section">
      <h2>The manufacturing process</h2>
      <p style={{maxWidth:920}}>
        Wood arrives. Furniture leaves. Between sit 19 tracked stages, four QC gates, and six contractor formulas. Below: the abbreviated flow on the left, the moving line in the center, the structural framework on the right - three views of the same process.
      </p>

      <div className="elite-mfg-grid" style={{
        display:'grid',
        gridTemplateColumns:'minmax(220px, 1fr) minmax(520px, 1.7fr) minmax(220px, 1fr)',
        gap:20,
        marginTop:24,
        alignItems:'start',
      }}>
        {/* LEFT - production flow narrative */}
        <aside style={{position:'sticky', top:16, alignSelf:'start'}}>
          <div style={{background:'#fff', border:'1px solid var(--border)', borderRadius:12, padding:18}}>
            <div style={{fontSize:10, fontWeight:700, letterSpacing:'0.14em', color:'var(--sg-blue)', textTransform:'uppercase', marginBottom:10}}>
